<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Обратная связь</title>
<link rel="stylesheet" href="form.css">
</head>

<body>

<header>
<h1>Форма обратной связи</h1>
</header>

<nav>
<a href="index.html">Главная</a> |
<a href="feedback.html">Обратная связь</a>
</nav>

<main>

<section>

<form action="#" method="post">

<fieldset>

<legend>Контактная информация</legend>

<label for="name">Имя</label>
<input type="text" id="name" name="name" list="names">

<datalist id="names">
<option value="Анна">
<option value="Мария">
<option value="Елена">
</datalist>

<br><br>

<label for="email">Email</label>
<input type="email" id="email" name="email">

<br><br>

<label for="course">Курс</label>

<select id="course">

<optgroup label="Бакалавриат">
<option>1 курс</option>
<option>2 курс</option>
<option>3 курс</option>
<option>4 курс</option>
</optgroup>

</select>

</fieldset>

<br>

<fieldset>

<legend>Сообщение</legend>

<label>Тема</label>

<input type="radio" name="topic"> Учёба
<input type="radio" name="topic"> Математика
<input type="radio" name="topic"> Программирование

<br><br>

<label for="message">Сообщение</label>

<textarea id="message" rows="5"></textarea>

<br><br>

<label>
<input type="checkbox">
Подписаться на новости
</label>

<br><br>

<button type="submit">Отправить</button>
<button type="reset">Очистить</button>

</fieldset>

</form>

</section>

</main>

<footer>

<hr>

<p>© 2026 ВШЭ</p>

</footer>

</body>
</html>
